{% extends "base.html" %}
{% block content %}
<section class="layout">
  <div class="main-col">
    <div class="controls">
      <form hx-get="/clips" hx-target="#clip-grid" hx-trigger="change" hx-swap="innerHTML">
        <label>Show
          <select name="show">
            <option value="labelled_aircraft" selected>Labelled: aircraft</option>
            <option value="labelled_none">Labelled: none</option>
            <option value="labelled">Labelled: any</option>
            <option value="aircraft">Detected: aircraft</option>
            <option value="none">Detected: none</option>
            <option value="all">All clips</option>
          </select>
        </label>
      </form>
    </div>

    <h2>Clips</h2>
    <div id="clip-grid">
      {% include "_clip_grid.html" %}
    </div>
  </div>

  <aside class="side-col">
    <h2>Live activity</h2>
    <ul id="activity" class="activity"></ul>

    <h3>Recent clips</h3>
    <ul id="videos" class="videos">
      {% for v in recent %}
      <li data-video-id="{{ v.id }}">
        <span class="fname">{{ v.filename }}</span>
        <span class="status status-{{ v.status.value }}">{{ v.status.value }}</span>
      </li>
      {% endfor %}
    </ul>
  </aside>
</section>
{% endblock %}

{% block scripts %}<script src="/static/app.js"></script>{% endblock %}
