{% extends "base.html" %}
{% block content %}
<section class="layout">
  <div class="main-col">
    <div id="content">
      {% include "_timeline.html" %}
    </div>
  </div>

  <aside class="side-col">
    {% if camera_stream_url %}
    <div class="live-cam">
      <div class="live-cam-head"><span class="live-dot"></span> Live camera</div>
      <a href="{{ camera_stream_url }}" target="_blank" rel="noopener" title="open full stream">
        <img class="cam-stream" src="{{ camera_stream_url }}" alt="live camera"
             onerror="this.classList.add('cam-broken'); this.nextElementSibling.style.display='flex';" />
        <div class="cam-offline">camera offline</div>
      </a>
    </div>
    {% endif %}

    <div id="calendar-wrap">
      {% include "_calendar.html" %}
    </div>

    <h2>Live activity</h2>
    <ul id="activity" class="activity"></ul>
  </aside>
</section>
{% endblock %}

{% block scripts %}<script src="/static/app.js"></script>{% endblock %}
